<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>송금 요청</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f7fb;
      color: #111827;
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    p {
      margin: 0 0 22px;
      color: #64748b;
      line-height: 1.5;
    }

    label {
      display: block;
      margin: 16px 0 7px;
      font-weight: 700;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      height: 48px;
      border: 1px solid #dbe3ef;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 16px;
      outline: none;
      background: white;
    }

    input:focus,
    select:focus {
      border-color: #3182f6;
      box-shadow: 0 0 0 4px rgba(49, 130, 246, 0.12);
    }

    button,
    a.button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      background: #3182f6;
      color: white;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 18px;
      display: grid;
      place-items: center;
      text-decoration: none;
    }

    .sub {
      background: #eef4ff;
      color: #2563eb;
    }

    .money {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 0;
      margin: 18px 0 4px;
    }

    .info {
      background: #f8fafc;
      border-radius: 14px;
      padding: 14px;
      margin-top: 18px;
      color: #475569;
      line-height: 1.6;
      font-size: 14px;
      word-break: break-all;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section id="maker">
      <h1>송금 링크 만들기</h1>
      <p>상대방 이름과 금액을 입력하면 공유 링크가 만들어집니다.</p>

      <label>송금할 사람 이름</label>
      <input id="payerName" placeholder="예: 민수" />

      <label>받는 사람 이름</label>
      <select id="receiverName">
        <option value="0" selected>박지완</option>
        <option value="1">장우영</option>
      </select>

      <label>은행명</label>
      <select id="bank">
        <option value="0">토스뱅크</option>
        <option value="1" selected>농협</option>
      </select>

      <label>계좌번호</label>
      <select id="account">
        <option value="0">100167624090</option>
        <option value="1" selected>3521907992053</option>
      </select>

      <label>받을 금액</label>
      <input id="amount" type="number" placeholder="예: 15000" />

      <button onclick="makeLink()">공유 링크 만들기</button>

      <div id="result" class="info hidden"></div>
      <button id="copyBtn" class="sub hidden" onclick="copyLink()">링크 복사하기</button>
    </section>

    <section id="payer" class="hidden">
      <h1 id="payTitle">송금해주세요</h1>
      <p id="payText"></p>

      <div class="money" id="payAmount"></div>

      <a id="tossLink" class="button" href="#">토스 앱으로 송금하기</a>

      <div class="info">
        토스 앱이 열리지 않으면 아래 계좌로 직접 송금해주세요.<br />
        <strong id="fallbackAccount"></strong>
      </div>
    </section>
  </main>

  <script>
    const receivers = ["박지완", "장우영"];
    const banks = ["토스뱅크", "농협"];
    const accounts = ["100167624090", "3521907992053"];

    const maker = document.getElementById("maker");
    const payer = document.getElementById("payer");

    const params = new URLSearchParams(location.search);
    const data = params.get("x");

    if (data) {
      const parts = data.split(",");

      const payerName = decodeURIComponent(parts[0] || "");
      const receiverName = receivers[Number(parts[1])];
      const bank = banks[Number(parts[2])];
      const account = accounts[Number(parts[3])];
      const amount = parts[4];

      if (payerName && receiverName && bank && account && amount) {
        maker.classList.add("hidden");
        payer.classList.remove("hidden");

        const amountText = Number(amount).toLocaleString("ko-KR");

        document.title = `${payerName}님 송금해주세요`;

        document.getElementById("payTitle").textContent =
          `${payerName}님, 송금해주세요`;

        document.getElementById("payText").textContent =
          `${receiverName}님에게 송금하는 요청입니다.`;

        document.getElementById("payAmount").textContent =
          `${amountText}원`;

        document.getElementById("fallbackAccount").textContent =
          `${bank} ${account}`;

        const tossUrl =
          `supertoss://send?amount=${encodeURIComponent(amount)}` +
          `&bank=${encodeURIComponent(bank)}` +
          `&accountNo=${encodeURIComponent(account)}` +
          `&origin=link`;

        document.getElementById("tossLink").href = tossUrl;
      }
    }

    function makeLink() {
      const payerName = document.getElementById("payerName").value.trim();
      const receiverIndex = document.getElementById("receiverName").value;
      const bankIndex = document.getElementById("bank").value;
      const accountIndex = document.getElementById("account").value;
      const amount = document.getElementById("amount").value.trim();

      if (!payerName || !amount) {
        alert("송금할 사람 이름과 금액을 입력해주세요.");
        return;
      }

      const shortData = [
        encodeURIComponent(payerName),
        receiverIndex,
        bankIndex,
        accountIndex,
        amount
      ].join(",");

      const shortLink =
        location.origin +
        location.pathname +
        "?x=" +
        shortData;

      window.createdLink = shortLink;

      const result = document.getElementById("result");
      result.classList.remove("hidden");
      result.innerHTML =
        `<strong>${payerName}님 송금해주세요</strong><br><br>` +
        `${shortLink}`;

      document.getElementById("copyBtn").classList.remove("hidden");
    }

    async function copyLink() {
      try {
        await navigator.clipboard.writeText(window.createdLink);
        alert("링크가 복사됐습니다.");
      } catch {
        alert("복사가 안 되면 링크를 직접 꾹 눌러 복사해주세요.");
      }
    }
  </script>
</body>
</html>
